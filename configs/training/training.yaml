# =============================================================================
# training/training.yaml — Training Execution Settings
# =============================================================================

# ---------------------------------------------------------------------------
# Cross-Validation
# ---------------------------------------------------------------------------
cv:
  n_splits: 5
  shuffle: true
  random_state: 42

# ---------------------------------------------------------------------------
# Evaluation thresholds
# ---------------------------------------------------------------------------
decision_threshold: 0.5   # Default classification cut-off

# ---------------------------------------------------------------------------
# Logging level for the training run
# ---------------------------------------------------------------------------
log_level: "INFO"

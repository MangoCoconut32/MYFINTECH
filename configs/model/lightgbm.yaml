# =============================================================================
# model/lightgbm.yaml — LightGBM Configuration
# =============================================================================

name: "lightgbm"
requires_scaling: false

# ---------------------------------------------------------------------------
# Calibration
# ---------------------------------------------------------------------------
calibration:
  method: "isotonic"
  ensemble: false

# ---------------------------------------------------------------------------
# Optuna Hyperparameter Tuning
# ---------------------------------------------------------------------------
optuna:
  n_trials: 50
  direction: "maximize"
  timeout_seconds: null

# ---------------------------------------------------------------------------
# LightGBM Hyperparameter Defaults
# ---------------------------------------------------------------------------
hyperparameters:
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 0.1
  n_jobs: -1
  verbosity: -1

# ---------------------------------------------------------------------------
# Optuna Search Ranges
# ---------------------------------------------------------------------------
search_space:
  n_estimators:
    type: int
    low: 200
    high: 1500
    step: 100
  learning_rate:
    type: float
    low: 0.01
    high: 0.2
    log: true
  num_leaves:
    type: int
    low: 20
    high: 150
  max_depth:
    type: int
    low: 3
    high: 12
  subsample:
    type: float
    low: 0.5
    high: 1.0
  colsample_bytree:
    type: float
    low: 0.5
    high: 1.0

# ---------------------------------------------------------------------------
# Artifact paths
# ---------------------------------------------------------------------------
artifacts:
  output_dir: "data/processed/models"
  model_prefix: "lgb"
  best_params_file: "data/processed/models/lgb_best_params.json"
  performance_file: "data/processed/models/lgb_performance.json"

# =============================================================================
# model/catboost.yaml — CatBoost Configuration
# =============================================================================

name: "catboost"
requires_scaling: false

# ---------------------------------------------------------------------------
# Calibration
# ---------------------------------------------------------------------------
calibration:
  method: "isotonic"
  ensemble: false

# ---------------------------------------------------------------------------
# Optuna Hyperparameter Tuning
# ---------------------------------------------------------------------------
optuna:
  n_trials: 50
  direction: "maximize"
  timeout_seconds: null

# ---------------------------------------------------------------------------
# CatBoost Hyperparameter Defaults
# ---------------------------------------------------------------------------
hyperparameters:
  iterations: 1000
  learning_rate: 0.05
  depth: 6
  l2_leaf_reg: 3.0
  bootstrap_type: "Bayesian"
  random_strength: 1.0
  bagging_temperature: 1.0
  od_type: "Iter"
  od_wait: 50
  verbose: 0
  allow_writing_files: false

# ---------------------------------------------------------------------------
# Optuna Search Ranges
# ---------------------------------------------------------------------------
search_space:
  iterations:
    type: int
    low: 500
    high: 2000
    step: 250
  learning_rate:
    type: float
    low: 0.01
    high: 0.2
    log: true
  depth:
    type: int
    low: 4
    high: 10
  l2_leaf_reg:
    type: float
    low: 1.0
    high: 10.0
    log: true
  random_strength:
    type: float
    low: 0.0
    high: 10.0

# ---------------------------------------------------------------------------
# Artifact paths
# ---------------------------------------------------------------------------
artifacts:
  output_dir: "data/processed/models"
  model_prefix: "cat"
  best_params_file: "data/processed/models/cat_best_params.json"
  performance_file: "data/processed/models/cat_performance.json"

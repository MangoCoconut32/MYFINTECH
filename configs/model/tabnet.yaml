# =============================================================================
# model/tabnet.yaml — TabNet (PyTorch-TabNet)
# =============================================================================

name: "tabnet"
requires_scaling: true

# ---------------------------------------------------------------------------
# Calibration
# ---------------------------------------------------------------------------
calibration:
  method: "isotonic"
  ensemble: false

# ---------------------------------------------------------------------------
# Optuna Hyperparameter Tuning
# ---------------------------------------------------------------------------
optuna:
  n_trials: 30
  direction: "maximize"
  timeout_seconds: null

# ---------------------------------------------------------------------------
# TabNet Hyperparameter Defaults
# ---------------------------------------------------------------------------
hyperparameters:
  n_d: 16
  n_a: 16
  n_steps: 3
  gamma: 1.3
  n_independent: 2
  n_shared: 2
  lambda_sparse: 0.001
  momentum: 0.02
  mask_type: "sparsemax"
  verbose: 0

# ---------------------------------------------------------------------------
# Optuna Search Ranges
# ---------------------------------------------------------------------------
search_space:
  n_d:
    type: int
    low: 8
    high: 64
    step: 8
  n_a:
    type: int
    low: 8
    high: 64
    step: 8
  n_steps:
    type: int
    low: 3
    high: 10
  gamma:
    type: float
    low: 1.0
    high: 2.0
  lambda_sparse:
    type: float
    low: 0.0001
    high: 0.01
    log: true

# ---------------------------------------------------------------------------
# Artifact paths
# ---------------------------------------------------------------------------
artifacts:
  output_dir: "data/processed/models"
  model_prefix: "tab"
  best_params_file: "data/processed/models/tab_best_params.json"
  performance_file: "data/processed/models/tab_performance.json"

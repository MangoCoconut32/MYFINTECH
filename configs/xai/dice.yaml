# =============================================================================
# xai/dice.yaml — DiCE Counterfactual Configuration
# =============================================================================

# Continuous features that can be varied
continuous_features:
  - "Age"
  - "Income"
  - "Wealth"
  - "FamilyMembers"
  - "FinancialEducation"
  - "RiskPropensity"
  - "Wealth_log"
  - "Income_log"
  - "Wealth_Age_Ratio_log"
  - "Wealth_per_person"
  - "Income_per_person"
  - "Income_Wealth_Ratio_log"

# Features allowed to vary for recourse
features_to_vary:
  - "Income"
  - "Wealth"
  - "FamilyMembers"

# Name of the outcome column (for DiCE data wrapper)
outcome_name: "target"

# DiCE generation parameters
n_counterfactuals: 3
method: "random"  # "random" is robust for most models
